name: Upload build artifacts
description: Uploads the published builds and the smoke-test log as workflow artifacts.

runs:
  using: composite
  steps:
    - name: Upload SirHurt.Cleaner.CLI
      uses: actions/upload-artifact@v7
      with:
        name: SirHurt.Cleaner.CLI
        path: out/SirHurt.Cleaner.CLI

    - name: Upload SirHurt.Cleaner.CLI_fat
      uses: actions/upload-artifact@v7
      with:
        name: SirHurt.Cleaner.CLI_fat
        path: out/SirHurt.Cleaner.CLI_fat

    - name: Upload Sirstrap.CLI
      uses: actions/upload-artifact@v7
      with:
        name: Sirstrap.CLI
        path: out/Sirstrap.CLI

    - name: Upload Sirstrap.CLI_fat
      uses: actions/upload-artifact@v7
      with:
        name: Sirstrap.CLI_fat
        path: out/Sirstrap.CLI_fat

    - name: Upload Sirstrap.UI
      uses: actions/upload-artifact@v7
      with:
        name: Sirstrap.UI
        path: out/Sirstrap.UI

    - name: Upload Sirstrap.UI_fat
      uses: actions/upload-artifact@v7
      with:
        name: Sirstrap.UI_fat
        path: out/Sirstrap.UI_fat

    - name: Upload the smoke-test log
      uses: actions/upload-artifact@v7
      with:
        name: Sirstrap.CLI_test.log
        path: out/Sirstrap.CLI_test.log
