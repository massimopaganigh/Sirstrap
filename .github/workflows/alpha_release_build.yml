name: Alpha Release Build

on:
  push:
    tags:
      - 'v*-alpha'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
      discussions: write
      id-token: write
      security-events: write
    uses: ./.github/workflows/_build.yml
    with:
      create-release: true
      prerelease: true
