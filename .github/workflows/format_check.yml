name: Format Check

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  format:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Verify formatting
        shell: bash
        run: dotnet format src/Sirstrap.slnx --verify-no-changes
